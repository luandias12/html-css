<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de Formulario</h1>
    <form action="" method="get">
        <p>
            <label for="iemail">E-mail</label>
            <input type="email" name="email" id="iemail" autocomplete="email" required minlength="5" maxlength="20">
        </p>
        <p>
            <label for="itelefone">Telefone</label>
            <input type="tel" name="telefone" id="itelefone" autocomplete="tel" pattern="´´\(d{2}\)d{4,5}-\d{4}$" required>
        </p>
        <!--Estudar mais sobre RegEx-->
        <p>
            <input type="submit">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
